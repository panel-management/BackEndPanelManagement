services:
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: prod:latest
    container_name: club_panel_prod
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - prod
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
