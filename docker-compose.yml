services:
  # development
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: dev:latest
    container_name: club_panel_dev
    ports:
      - "8000:3000"
    volumes:
      - ./src:/usr/src/app/src
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - TZ=Asia/Tehran
    profiles:
      - dev
  # production
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: prod:latest
    container_name: club_panel_prod
    ports:
      - "80:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Tehran
    profiles:
      - prod