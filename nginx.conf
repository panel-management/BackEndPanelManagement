# Global Settings
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # cache for API responses (adjust TTL as needed)
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=my_cache:10m max_size=100m inactive=60s use_temp_path=off;

    # Backend
    upstream nest_backend {
        server app-prod:3000;
        keepalive 32;
    }

    # HTTP Server
    server {
        listen 80;
        server_name _;

        location /uploads/ {
            root /path/to/uploads;
            add_header Cross-Origin-Resource-Policy cross-origin always;
            add_header Content-Security-Policy "default-src 'self'; img-src 'self' http://localhost:3000 data:;" always;
        }

        location / {
            proxy_pass http://nest_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # caching
            proxy_cache my_cache;
            proxy_cache_valid 200 10s;
        }
    }

    # HTTPS Server
